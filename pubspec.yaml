name: grow_daily_v2
description: "GrowDaily V2 — a visual life progress system. Color your life, one square at a time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Offline-first caching ────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── State management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # Navigation is hand-rolled in main.dart (MaterialApp routes +
  # onGenerateRoute for the instant bottom-tab switch) — go_router was
  # never wired up, so it's intentionally not a dependency here. If routing
  # is ever migrated to go_router, re-add it then rather than carrying an
  # unused package in the meantime.

  # ── Animations ───────────────────────────────────────────────
  flutter_animate: ^4.5.0
  lottie: ^3.1.3

  # ── Fonts ────────────────────────────────────────────────────
  # Pinned >=7 — 6.x's const FontWeight-keyed map fails to const-evaluate
  # against newer Flutter SDKs ("does not have a primitive operator '=='"),
  # which is what broke the release archive build.
  google_fonts: ^8.1.0

  # ── Utilities ────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: '>=0.19.0 <0.21.0'
  equatable: ^2.0.5

  # ── Local push notifications ─────────────────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # ── Prayer-time-linked reminders ──────────────────────────────
  # adhan_dart: offline astronomical prayer-time calculation (lat/lng + date
  # in, all 5 prayer times out) — pure Dart, zero runtime dependencies, MIT
  # licensed, no native platform code at all. Picked over the older
  # `adhan` package (still on a years-stale 2.0.0-nullsafety.1 prerelease)
  # specifically because this one is actively maintained (verified
  # publisher, last published a few months ago as of this writing).
  # PrayerTimesService.calculate now prefers a live Aladhan API fetch for an
  # exact result and only falls back to this package when that call fails —
  # see that class's doc comment.
  #
  # Pinned to ^2.0.1, not ^1.2.0 (this project's original pin): going global
  # (see PrayerTimesService.resolveRegion) needs 8 named calculation-method
  # presets — algerian/france/indonesian/jordan/morocco/portugal/russia/
  # tunisia — that only exist from 2.0.0 onward (confirmed via the
  # package's own changelog on pub.dev). Checked 2.0.0's breaking changes
  # against this codebase before bumping: currentPrayer()/nextPrayer()'s
  # positional-to-named arg change affects zero call sites here (this app
  # only ever reads PrayerTimes' individual fajr/sunrise/dhuhr/asr/maghrib/
  # isha fields, never those convenience methods); Coordinates' new range
  # assertions are a non-issue since every coordinate here comes from real
  # GPS/geocoding, always in-range; the Singapore preset's rounding change
  # doesn't affect any currently-covered region.
  adhan_dart: ^2.0.1
  # http: used by GeocodingService to resolve a user-typed city name to
  # coordinates via Open-Meteo's free, keyless geocoding endpoint (the
  # manual fallback path — see city_search_sheet.dart — for whenever
  # auto-detection below can't run); by PrayerTimesService to fetch exact
  # prayer times from the Aladhan API; and by CountryLookupService to
  # resolve a country code from coordinates via BigDataCloud's free,
  # keyless reverse-geocoding endpoint (see that class's doc comment) — all
  # three free/keyless REST calls, no dedicated client package needed for
  # any of them.
  http: ^1.2.0
  # geolocator: on-device GPS, so prayer-time setup can auto-detect location
  # instead of requiring a typed city search — see DeviceLocationService.
  # This is the "contained, additive change" the http comment above used to
  # anticipate needing eventually; the manual city-search path stays as the
  # fallback (long-press the location row in Notification Settings) for
  # denied permission / disabled location services / travel. Verified
  # against pub.dev at wiring time: 14.0.2 needs Dart >=3.5.0, comfortably
  # inside this project's >=3.11.0 floor.
  geolocator: ^14.0.2

  # ── Home screen widget ───────────────────────────────────────
  # Dart-side bridge only — the widget's actual UI is native Swift, written
  # once the Xcode Widget Extension target exists. See ios/WIDGET_SETUP.md.
  home_widget: ^0.9.2

  # ── Voice notes (Tasks) ──────────────────────────────────────
  # record: mic -> local file. audioplayers: local-file playback for the
  # task row. path_provider: where that file actually lives on-device —
  # already an indirect dependency via home_widget, declared directly here
  # too rather than relying on another package's transitive version.
  # audioplayers pinned to 6.7.1, not the newer 6.8.x: 6.8.0+ requires
  # Flutter >=3.44.0, which is newer than this project's installed SDK
  # (3.41.5 as of July 2026). Bump this once `flutter upgrade` moves past
  # 3.44 — the API used here (play/pause/stop/DeviceFileSource) is
  # unchanged between 6.7.x and 6.8.x either way.
  record: ^6.2.0
  audioplayers: ^6.7.1
  path_provider: ^2.1.3

  # ── Rooms (group challenges) ──────────────────────────────────
  # Native share sheet for sending a room's join code (and, since the
  # app_links entry below, its growdaily:// deep link too) to friends via
  # text, WhatsApp, etc. - share_plus itself is just plain text sharing, no
  # setup of its own required. Pinned >=11.1.0, not 10.x: the
  # SharePlus.instance.share(ShareParams(...)) API this code uses was
  # introduced as a breaking change in 11.0.0 (10.x only has the older
  # static Share.share() call).
  # 11.1.0 specifically (not 12.x/13.x) to stay clear of those versions'
  # higher Android/Flutter SDK floors - this project's installed SDK is
  # 3.41.5 as of July 2026, and 13.0.0 alone needs Flutter >=3.41.6.
  share_plus: ^11.1.0

  # Deep linking - a growdaily://join/CODE link (see roomShareMessage in
  # app_strings.dart) opens straight into a pre-filled Join Room sheet
  # instead of the recipient typing the code by hand. Custom URL scheme
  # only, not Universal Links/App Links - those need a real HTTPS domain
  # hosting an apple-app-site-association / assetlinks.json file plus
  # Apple Developer Portal / Google Play Console configuration, none of
  # which this project has yet. iOS wiring lives in ios/Runner/Info.plist
  # (CFBundleURLTypes + FlutterDeepLinkingEnabled); there's no android/
  # project in this repo yet (see flutter_launcher_icons' android: false
  # comment below) so no Android wiring exists either - add it whenever
  # `flutter create --platforms=android .` finally gets run.
  #
  # Pinned to ^7.0.0, not 7.1.x/7.2.x: 7.1.0 bumped app_links' own minimum
  # to Flutter 3.44/Dart 3.12 ("chore: Updates minimum supported SDK
  # version"), newer than this machine's actual installed Dart (3.11.3 -
  # `flutter pub get` fails solving 7.1.1+ as a result; see BUILD_LESSONS.md
  # #9). 7.0.0 only needs Dart 3.10 and already has the exact scene-
  # lifecycle iOS support (AppLinks(), uriLinkStream, getInitialLink()) the
  # main.dart wiring here uses - that Dart-level API has been stable since
  # 6.0.0, untouched by 7.1.0's SDK-floor bump.
  app_links: ^7.0.0

  # ── In-app purchases (Premium) ─────────────────────────────────
  # RevenueCat wraps StoreKit (and Google Play Billing, once Android
  # exists) so entitlement is verified server-side instead of trusting
  # whatever the client claims - see PurchaseService's doc comment and
  # firestore.rules' premiumFieldOk() comment for the security rationale.
  # Pinned to the exact versions researched against pub.dev/RevenueCat's own
  # docs at wiring time (current as of July 2026) rather than a guess -
  # bump deliberately, not implicitly, since a major bump here can change
  # SDK method signatures. purchases_ui_flutter itself depends on
  # purchases_flutter ^10.4.1, so both are pinned to that exact floor
  # together rather than letting them drift apart.
  purchases_flutter: ^10.4.1
  # RevenueCat's hosted Paywall + Customer Center UI (RevenueCatUI) - see
  # PurchaseService.presentPaywall/presentCustomerCenter. Requires iOS
  # 15.0+ to actually render (see ios/Podfile) even though the package
  # itself installs down to iOS 11.
  purchases_ui_flutter: ^10.4.1
  # Opens the Terms of Use / Privacy Policy links on PremiumScreen (see
  # premium_screen.dart) - required on any subscription purchase screen by
  # App Store Guideline 3.1.2. Pinned to the current latest (6.3.2, from
  # the flutter.dev-verified publisher) rather than an older floor - this
  # package's SDK requirements have stayed broadly compatible across minor
  # versions for a long time, unlike some of the pins above that needed an
  # exact older version to match this project's installed SDK.
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # ────────────────────────────────────────────────────────────
  # Codegen tools (build_runner, freezed, hive_generator, riverpod_generator,
  # json_serializable) are omitted in Phase 1 — all models are pure handwritten
  # Dart and require no generation step. Re-add after `flutter upgrade`.
  # ────────────────────────────────────────────────────────────
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/images/character/
    - assets/images/accessories/
    - assets/icons/

# ── App icon generation ──────────────────────────────────────────
# Run once (and again any time icon_app.png changes):
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/icon_app.png"
  ios: true
  # Flip this back to true once `flutter create --platforms=android .` has
  # been run — right now there's no android/ folder, and this package hard
  # crashes (rather than skipping gracefully) if android: true with no
  # AndroidManifest.xml to write into, which meant the run that included
  # this config never even got to the iOS icons below it.
  android: false
  remove_alpha_ios: true # iOS icons must not have transparency
  min_sdk_android: 21

# ── Native splash screen ─────────────────────────────────────────
# Run once (and again any time splash_background.png changes):
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FEFAF0"
  image: assets/images/splash_background.png
  android_12:
    color: "#FEFAF0"
    image: assets/images/splash_background.png
