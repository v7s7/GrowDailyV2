name: grow_daily_v2
description: "GrowDaily V2 — Gamified Islamic habit tracker with RPG progression."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Offline-first caching ────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── State management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Animations ───────────────────────────────────────────────
  flutter_animate: ^4.5.0
  lottie: ^3.1.3

  # ── Code generation support ──────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Utilities ────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  # custom_lint and riverpod_lint removed — incompatible with current Dart SDK _macros
  # re-add when upgrading to latest Flutter: custom_lint ^0.7.x, riverpod_lint ^2.4.x

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/icons/
