name: grow_daily_v2
description: "GrowDaily V2 — Gamified Islamic habit tracker with RPG progression."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Offline-first caching ────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── State management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ───────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Animations ───────────────────────────────────────────────
  flutter_animate: ^4.5.0
  lottie: ^3.1.3

  # ── Fonts ────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Utilities ────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # ────────────────────────────────────────────────────────────
  # Codegen tools (build_runner, freezed, hive_generator, riverpod_generator,
  # json_serializable) are omitted in Phase 1 — all models are pure handwritten
  # Dart and require no generation step. Re-add after `flutter upgrade`.
  # ────────────────────────────────────────────────────────────

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/icons/
